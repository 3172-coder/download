<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>mods GTAV Zombieland VR</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
      overflow: hidden;
    }

    /* Первый фон */
    body::before {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('background1.jpg') center/cover no-repeat;
      z-index: -2;
    }

    /* Второй фон (будет плавно появляться) */
    body::after {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('background2.jpg') center/cover no-repeat;
      z-index: -1;
      opacity: 0;
      animation: fadeBg 10s infinite;
    }

    @keyframes fadeBg {
      0% { opacity: 0; }
      50% { opacity: 1; }
      100% { opacity: 0; }
    }

    .card {
      background: #1e293b;
      padding: 30px;
      border-radius: 12px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    }

    h1 {
      margin-bottom: 20px;
    }

    a.button {
      display: inline-block;
      padding: 12px 20px;
      background: #3b82f6;
      color: white;
      text-decoration: none;
      border-radius: 8px;
      transition: 0.3s;
    }

    a.button:hover {
      background: #2563eb;
    }

    .note {
      margin-top: 15px;
      font-size: 12px;
      color: #94a3b8;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>"GTAV Zombieland VR"</h1>
    <a class="button" href="for GTAV.torrent" download>Скачать торрент файл</a>
    <div class="note">Сборка модов для GTAV всё в одном by max_remaster</div>
  </div>
</body>
</html>
